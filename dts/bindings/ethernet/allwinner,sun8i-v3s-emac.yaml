description: Allwinner Sun8i V3s EMAC Ethernet controller

compatible: "allwinner,sun8i-v3s-emac"

include: ethernet-controller.yaml

properties:
  reg:
    required: true
  interrupts:
    required: true
  clocks:
    type: phandle-array
    required: true
    description: |
      EMAC bus clock specifier. Must reference the CCU CLK_BUS_EMAC gate.
  resets:
    type: phandle-array
    required: true
    description: |
      EMAC bus reset specifier. Must reference the CCU RST_BUS_EMAC gate.
  allwinner,leds-active-low:
    type: boolean
    description: |
      EPHY LEDs are active low. When set, the LED polarity bit in the
      syscon register will be configured for active low LEDs.
  allwinner,phy-addr:
    type: int
    default: 1
    description: |
      Internal EPHY address. Default is 1.
