description: Allwinner V3s PWM controller

compatible: "allwinner,sun8i-v3s-pwm"

include: [pwm-controller.yaml, pinctrl-device.yaml, base.yaml]

properties:
  reg:
    required: true

  "#pwm-cells":
    const: 2

pwm-cells:
  - channel
  # period in terms of nanoseconds
  - period
