description: Allwinner sun8i V3s MUSB USB OTG controller

compatible: "allwinner,sun8i-v3s-musb"

include: [usb-controller.yaml, reset-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true

  resets:
    required: true

  phys:
    type: phandle-array
    required: true

  num-bidir-endpoints:
    type: int
    required: true
    description: Number of bidirectional endpoints including EP0
