description: Allwinner D1/T113-S3 GPIO port

compatible: "allwinner,sun20i-d1-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: false

  "#gpio-cells":
    const: 2

  "#interrupt-cells":
    type: int
    const: 2

gpio-cells:
  - pin
  - flags
